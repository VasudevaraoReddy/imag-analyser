# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - image-analysis-be

on:
  push:
    branches:
      - image-flow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🛠️ Local Build Section (Optional)
      # Runs against the monorepo subfolder where the API lives.
      - name: Create and Start virtual environment and Install dependencies
        working-directory: apps/api          # ← NEW
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # Upload only the contents of apps/api/ — Oryx will build server-side
      # because SCM_DO_BUILD_DURING_DEPLOYMENT is set on the App Service.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: apps/api                     # ← CHANGED (was ".")
          include-hidden-files: false        # leave default
          # Anything below apps/api/ is in the artifact; antenv was created
          # at apps/api/antenv so it gets uploaded — keep the exclude below.

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          # When apps/api/ was uploaded, the downloaded artifact extracts
          # straight into the runner's working dir as if it WERE apps/api.
          # That's what App Service wants.

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'image-analysis-be'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4B11715EF84A4605BB9FAAE1851E51B8 }}