# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - image-analysis-fe

on:
  push:
    branches:
      - image-flow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
        
        # Install the whole monorepo so @bank-arch/shared resolves
      - name: Install monorepo dependencies
        run: npm install

      # Build the shared types package first
      - name: Build @bank-arch/shared
        run: |
          rm -rf packages/shared/dist packages/shared/tsconfig.tsbuildinfo
          npx tsc -b packages/shared --force

      # Build the React app — produces apps/web/dist/
      - name: Build @bank-arch/web
        run: npm run build --workspace=@bank-arch/web
  
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/web/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9A91061B0ACC4B77BBBFF6B38EA73EE6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_34CE1221E9044CD284BED3ADA4EADF8E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_72BB83684D5A4E01841CE96B6F6D0C72 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'image-analysis-fe'
          slot-name: 'Production'
          package: .
          