# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - image-analysis-fe

on:
  push:
    branches: [ image-flow ]
    paths:
      # Only run when something the frontend actually depends on changes
      - 'apps/web/**'
      - 'packages/shared/**'                    # Zod schemas; UI types depend on it
      - 'package.json'                          # Monorepo root: workspace changes
      - 'package-lock.json'
      - '.github/workflows/image-flow_image-analysis-fe.yml'
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install monorepo dependencies
        run: npm install

      - name: Build @bank-arch/shared
        run: |
          rm -rf packages/shared/dist packages/shared/tsconfig.tsbuildinfo
          npx tsc -b packages/shared --force

      - name: Build @bank-arch/web
        env:
          # Bakes the backend URL into the JS bundle at build time.
          # Local dev still uses /api via Vite proxy (the api.ts fallback).
          VITE_API_BASE: 'https://image-analysis-be-ftenc4c2d2ehgye3.southindia-01.azurewebsites.net/api'
        run: npm run build --workspace=@bank-arch/web

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/web/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5D8754CE0B4A411CB8D94656F08ACF89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6138378668474872B0E09BB746422137 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D0478F7D30004CADBCBAE637B15E6E8B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'image-analysis-fe'
          slot-name: 'Production'
          package: .
          